version: '3.9'

# MyDigiSence — Local Development Services
# Run: docker compose -f infrastructure/docker/docker-compose.dev.yml up -d

services:
  # ─── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mydigisence-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: devpassword
      MONGO_INITDB_DATABASE: mydigisence
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: mydigisence-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Elasticsearch ────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: mydigisence-elasticsearch
    restart: unless-stopped
    ports:
      - '9200:9200'
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -v '"status":"red"'
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Qdrant (Vector DB) ───────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: mydigisence-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: curl -s http://localhost:6333/healthz | grep ok
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── MailHog (Dev email catch-all) ───────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mydigisence-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI
    logging:
      driver: none

  # ─── Mongo Express (DB Admin UI) ──────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: mydigisence-mongo-express
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: devpassword
      ME_CONFIG_MONGODB_URL: mongodb://admin:devpassword@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongodb:
        condition: service_healthy

  # ─── Redis Commander (Redis UI) ───────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mydigisence-redis-ui
    restart: unless-stopped
    ports:
      - '8082:8081'
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  qdrant_data:

networks:
  default:
    name: mydigisence-dev
